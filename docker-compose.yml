version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: blog_mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: blog
    volumes:
      - mongodb_data:/data/db
    networks:
      - blog_network

  app:
    build: .
    container_name: blog_app
    ports:
      - '3000:3000'
    environment:
      MONGODB_URI: mongodb://mongodb:27017/blog
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - ./src:/app/src
      - ./app:/app/app
    networks:
      - blog_network
    command: npm run dev

volumes:
  mongodb_data:

networks:
  blog_network:
    driver: bridge
